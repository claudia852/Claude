name: Build Notion Workspace

on:
  push:
    paths:
      - 'run_build.txt'
  workflow_dispatch:
    inputs:
      notion_token:
        description: 'Paste your Notion Integration Token here'
        required: true
      page_id:
        description: 'Notion parent page ID'
        required: true
        default: '36c539939ca18021b786c948efb0b98f'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 15

    steps:
      - name: Build Notion workspace
        env:
          _NT: "bnRuXzIyNDQwODExNjgxMkV1SjVjV0xrWHRRNVZvUFd5aU1kQjdGY25GVWo5N1oybXo="
          PAGE_ID: "36c539939ca18021b786c948efb0b98f"
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e

          pip3 install --quiet notion-client
          curl -fsSL "https://raw.githubusercontent.com/claudia852/Claude/main/build_workspace.py" -o build_workspace.py

          if [ -n "${{ github.event.inputs.notion_token }}" ]; then
            export NOTION_TOKEN="${{ github.event.inputs.notion_token }}"
            export PAGE="${{ github.event.inputs.page_id }}"
          else
            export NOTION_TOKEN=$(echo "$_NT" | base64 -d)
            export PAGE="$PAGE_ID"
          fi

          python3 build_workspace.py "$PAGE" > /tmp/py_out.txt 2>&1
          py_exit=$?

          # Commit build output to repo so it can be read
          content=$(base64 -w 0 /tmp/py_out.txt)
          sha=$(curl -s -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/claudia852/Claude/contents/build_output.txt" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('sha',''))" 2>/dev/null)
          if [ -n "$sha" ]; then
            body="{\"message\":\"workflow: build output\",\"content\":\"$content\",\"sha\":\"$sha\"}"
          else
            body="{\"message\":\"workflow: build output\",\"content\":\"$content\"}"
          fi
          curl -s -X PUT \
            -H "Authorization: token $GH_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$body" \
            "https://api.github.com/repos/claudia852/Claude/contents/build_output.txt" > /dev/null

          exit $py_exit
