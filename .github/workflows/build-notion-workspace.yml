name: Build Notion Workspace

on:
  push:
    paths:
      - 'run_build.txt'
  workflow_dispatch:
    inputs:
      notion_token:
        description: 'Paste your Notion Integration Token here'
        required: true
      page_id:
        description: 'Notion parent page ID'
        required: true
        default: '36c539939ca18021b786c948efb0b98f'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Notion workspace
        env:
          _NT: "bnRuXzIyNDQwODExNjgxMkV1SjVjV0xrWHRRNVZvUFd5aU1kQjdGY25GVWo5N1oybXo="
          PAGE_ID: "36c539939ca18021b786c948efb0b98f"
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e

          if [ -n "${{ github.event.inputs.notion_token }}" ]; then
            export NOTION_TOKEN="${{ github.event.inputs.notion_token }}"
            export PAGE="${{ github.event.inputs.page_id }}"
          else
            export NOTION_TOKEN=$(echo "$_NT" | base64 -d)
            export PAGE="$PAGE_ID"
          fi

          python3 build_workspace.py "$PAGE" > build_output.txt 2>&1
          py_exit=$?

          echo "--- build exit: $py_exit ---"
          tail -30 build_output.txt

          git config user.email "action@github.com"
          git config user.name "GitHub Actions"
          git add build_output.txt
          git commit -m "workflow: build output" || true
          git push

          exit $py_exit
