name: Build Notion Workspace

on:
  workflow_dispatch:
    inputs:
      notion_token:
        description: 'Paste your Notion Integration Token here'
        required: true
      page_id:
        description: 'Notion parent page ID'
        required: true
        default: '36c539939ca18021b786c948efb0b98f'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install notion-client

      - name: Build Notion workspace
        env:
          NOTION_TOKEN: ${{ github.event.inputs.notion_token }}
        run: python build_workspace.py ${{ github.event.inputs.page_id }}
